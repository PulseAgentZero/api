name: Build and deploy Backend

on:
    push:
        branches: [main, master]
        paths:
            - 'app/**'
            - 'scripts/**'
            - 'requirements.txt'
            - 'alembic.ini'
            - 'docker/**'
            - 'Makefile'
            - '.github/workflows/deployment.yaml'

    workflow_dispatch:

env:
    DEPLOY_REMOTE_PATH: /home/github/pulse-backend
    COMPOSE_FILE: docker/compose/cloud/docker-compose.yml

jobs:
    build:
        name: Docker Compose build and deploy
        environment: production
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Ensure deploy directory exists on VPS
              uses: appleboy/ssh-action@v1.2.4
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script_stop: true
                  script: |
                      set -euo pipefail
                      mkdir -p "${{ env.DEPLOY_REMOTE_PATH }}"

            - name: Sync files to server
              uses: burnett01/rsync-deployments@5.2
              with:
                  switches: >-
                      -avzr --delete
                      --exclude=docker/compose/cloud/.env
                      --exclude=license_private.pem
                      --exclude=license_public.pem
                      --rsync-path="sudo rsync"
                  path: ./
                  remote_path: ${{ env.DEPLOY_REMOTE_PATH }}/
                  remote_host: ${{ secrets.VPS_HOST }}
                  remote_user: ${{ secrets.VPS_USER }}
                  remote_key: ${{ secrets.VPS_SSH_KEY }}

            - name: Build and run with Docker Compose
              uses: appleboy/ssh-action@v1.2.4
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script_stop: true
                  script: |
                      set -euo pipefail
                      cd "${{ env.DEPLOY_REMOTE_PATH }}"
                      docker compose -f "${{ env.COMPOSE_FILE }}" up -d --build --remove-orphans

            - name: Notify deployment status
              if: always()
              run: |
                  if [ "${{ job.status }}" == "success" ]; then
                    echo "Deployment successful"
                  else
                    echo "Deployment failed"
                    exit 1
                  fi
