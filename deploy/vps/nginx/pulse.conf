# ─────────────────────────────────────────────────────────────────────────────
# Pulse — VPS nginx (cloud production)
#
# Hostnames (Entivia example):
#   entivia.online          → Next.js marketing & legal only (landing, pricing, trust)
#   www.entivia.online      → 301 to entivia.online
#   app.entivia.online      → Next.js auth (/auth/*) + dashboard (/dashboard/*)
#   docs.entivia.online     → Next.js product docs (/docs/* in the app)
#   api.entivia.online      → FastAPI (all routes including /api/v1/agent)
#   license.entivia.online  → License server (self-hosted activation + Paystack)
#
# DNS: A/AAAA for @, www, app, docs, api, license → VPS public IP.
#
# TLS (after DNS propagates):
#   sudo certbot --nginx \
#     -d entivia.online -d www.entivia.online \
#     -d app.entivia.online -d docs.entivia.online \
#     -d api.entivia.online -d license.entivia.online
#
# Backend .env (cloud compose on same host):
#   FRONTEND_URL=https://app.entivia.online
#   # Email links (verify, reset password) and CORS use FRONTEND_URL.
#
# Dashboard build (dashboard repo):
#   NEXT_PUBLIC_API_URL=https://api.entivia.online
#
# Install (Docker reverse-proxy on reverse-proxy_nginx-network):
#   cp deploy/vps/nginx/pulse.conf ~/reverse-proxy/conf.d/pulse.conf
#   docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload
#   nginx-proxy must join external network reverse-proxy_nginx-network (same as api + dashboard).
#   Backends use compose aliases: pulse-api, pulse-frontend, pulse-license.
#   DNS is resolved at request time (not at nginx start) so restarts do not require nginx reload.
#
# Install (host nginx with published host ports API_PORT/LICENSE_PORT/FRONTEND_PORT):
#   Edit the three $pulse_*_upstream maps below to 127.0.0.1:<port> (8040, 3096, 8072).
#   Variable proxy_pass needs no resolver when using literal IPs.
#   sudo cp deploy/vps/nginx/pulse.conf /etc/nginx/sites-available/pulse.conf
#   sudo ln -sf /etc/nginx/sites-available/pulse.conf /etc/nginx/sites-enabled/pulse.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Dynamic upstreams (Docker DNS) ───────────────────────────────────────────
# Static `upstream { server name:port }` resolves once at load/reload. After a
# container restart the IP changes and nginx keeps proxying the old address (502)
# until you reload nginx — or fails `nginx -t` if the host is down at reload time.
#
# Variable proxy_pass re-resolves via the http-level resolver in nginx-proxy
# (do not add resolver here — duplicate directive). Ensure main nginx.conf has:
#   resolver 127.0.0.11 valid=10s ipv6=off;
# `nginx -t` works even when backends are stopped; first requests may 502 until up.

map $host $pulse_api_upstream {
    default pulse-api:8000;
}

map $host $pulse_frontend_upstream {
    default pulse-frontend:3000;
}

map $host $pulse_license_upstream {
    default pulse-license:8002;
}

map $host $pulse_hackathon_upstream {
    default 127.0.0.1:8010;
}

# Fail fast when a backend is down during restart (default is 60s).
proxy_connect_timeout 15s;

# ── HTTP → HTTPS (certbot adds ssl blocks; keep these for renewal) ────────────

server {
    listen 80;
    listen [::]:80;
    server_name
        entivia.online
        www.entivia.online
        app.entivia.online
        docs.entivia.online
        api.entivia.online
        license.entivia.online
        hackathon.entivia.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# entivia.online — Marketing & legal only (no auth or dashboard)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 25m;

    # Auth and product UI live on app.*
    location /auth {
        return 301 https://app.entivia.online$request_uri;
    }

    location /dashboard {
        return 301 https://app.entivia.online$request_uri;
    }

    # Product docs live on docs.* (/docs/foo → docs.entivia.online/foo).
    location ~ ^/docs(?:/(.*))?$ {
        return 301 https://docs.entivia.online/$1$is_args$args;
    }

    location /_next/static/ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    location / {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    return 301 https://entivia.online$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════════
# app.* — Auth, onboarding, and dashboard (Next.js)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 25m;

    location ~ ^/docs(?:/(.*))?$ {
        return 301 https://docs.entivia.online/$1$is_args$args;
    }

    # Marketing routes stay on apex.
    location ~ ^/(features|pricing|trust|security|privacy|terms)(/|$) {
        return 301 https://entivia.online$request_uri;
    }

    location /_next/static/ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # App home → login (dashboard layout redirects authenticated users).
    location = / {
        return 302 /auth/login;
    }

    location / {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# docs.* — Product documentation (Next.js /docs/*)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 10m;

    # Auth and dashboard live on app.* — redirect if anyone lands here.
    location ~ ^/(auth|dashboard)(/|$) {
        return 301 https://app.entivia.online$request_uri;
    }

    # Marketing routes stay on apex.
    location ~ ^/(features|pricing|trust|security|privacy|terms)(/|$) {
        return 301 https://entivia.online$request_uri;
    }

    # docs.entivia.online/              → Next.js /docs
    # docs.entivia.online/getting-started → Next.js /docs/getting-started
    location = / {
        proxy_pass         http://$pulse_frontend_upstream/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /_next/ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # Public assets (logo, connector icons, favicons, fonts) live at the site
    # root in Next.js — must NOT get the /docs/ rewrite or they 404.
    location /connectors/ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Catch-all for any other static file at the root (logo.svg, favicon.ico,
    # fonts, images, manifest, etc.) so docs.* mirrors what Next.js serves on
    # the main origin.
    location ~* ^/[^/]+\.(svg|png|jpg|jpeg|gif|ico|webp|avif|woff|woff2|ttf|otf|eot|map|txt|xml|json|webmanifest)$ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=86400";
        access_log         off;
    }

    # Canonical short URLs on docs.* — strip legacy /docs prefix from bookmarks.
    location = /docs {
        return 301 https://$host/;
    }

    location = /docs/ {
        return 301 https://$host/;
    }

    location ~ ^/docs/(.+)$ {
        return 301 https://$host/$1$is_args$args;
    }

    # Paths that still start with /docs/ (before 301) pass through to Next.js.
    location /docs/ {
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }

    location / {
        rewrite ^/(.*)$ /docs/$1 break;
        proxy_pass         http://$pulse_frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# api.* — FastAPI backend (agent chat is /api/v1/agent on the main API process)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 520m;

    location = /health {
        proxy_pass         http://$pulse_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Agent SSE — same API process (:8000), not a separate public upstream.
    location ~ ^/api/v1/agent {
        proxy_pass              http://$pulse_api_upstream;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass         http://$pulse_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location /assets/ {
        proxy_pass         http://$pulse_api_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal OpenAPI — public ReDoc stays at /api/public/redoc for API reference links.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    location = / {
        return 200 'Pulse API\n';
        add_header Content-Type text/plain;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# license.* — Pulse license server
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 1m;

    location = /health {
        proxy_pass         http://$pulse_license_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /validate {
        proxy_pass         http://$pulse_license_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/v1/keys/ {
        proxy_pass         http://$pulse_license_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    location = / {
        return 200 'Pulse License Server\n';
        add_header Content-Type text/plain;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# hackathon.* — DSN x Bluechip LLM Agent Challenge API (Task A + Task B)
# Deploy: docker compose -f hackathon/docker-compose.yml (port 8010 on host)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name hackathon.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;

    client_max_body_size 2m;

    location = /healthz {
        proxy_pass         http://$pulse_hackathon_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass         http://$pulse_hackathon_upstream;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
