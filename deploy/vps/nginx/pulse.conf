# ─────────────────────────────────────────────────────────────────────────────
# Pulse — VPS nginx (cloud production)
#
# Hostnames (Entivia example):
#   entivia.online          → Next.js marketing & legal only (landing, pricing, trust)
#   www.entivia.online      → 301 to entivia.online
#   app.entivia.online      → Next.js auth (/auth/*) + dashboard (/dashboard/*)
#   docs.entivia.online     → Next.js product docs (/docs/* in the app)
#   api.entivia.online      → FastAPI (all routes including /api/v1/agent)
#   license.entivia.online  → License server (self-hosted activation + Paystack)
#
# DNS: A/AAAA for @, www, app, docs, api, license → VPS public IP.
#
# TLS (after DNS propagates):
#   sudo certbot --nginx \
#     -d entivia.online -d www.entivia.online \
#     -d app.entivia.online -d docs.entivia.online \
#     -d api.entivia.online -d license.entivia.online
#
# Backend .env (cloud compose on same host):
#   FRONTEND_URL=https://app.entivia.online
#   # Email links (verify, reset password) and CORS use FRONTEND_URL.
#
# Dashboard build (dashboard repo):
#   NEXT_PUBLIC_API_URL=https://api.entivia.online
#
# Install (Docker reverse-proxy on reverse-proxy_nginx-network):
#   cp deploy/vps/nginx/pulse.conf ~/reverse-proxy/conf.d/pulse.conf
#   docker exec nginx-proxy nginx -t && docker exec nginx-proxy nginx -s reload
#   Upstreams use compose network aliases: pulse-api, pulse-frontend, pulse-license.
#
# Install (host nginx with published host ports API_PORT/LICENSE_PORT/FRONTEND_PORT):
#   Change upstreams below to 127.0.0.1:<host-port> (defaults 8040, 3096, 8072).
#   sudo cp deploy/vps/nginx/pulse.conf /etc/nginx/sites-available/pulse.conf
#   sudo ln -sf /etc/nginx/sites-available/pulse.conf /etc/nginx/sites-enabled/pulse.conf
#   sudo nginx -t && sudo systemctl reload nginx
# ─────────────────────────────────────────────────────────────────────────────

map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

# ── Upstreams (Docker network aliases on reverse-proxy_nginx-network) ─────────
# Start cloud + dashboard compose before nginx reload so these names resolve.
# Isolated `nginx -t` without the stack will fail on unknown hosts — expected.

upstream pulse_api {
    server pulse-api:8000;
    keepalive 32;
}

upstream pulse_frontend {
    server pulse-frontend:3000;
    keepalive 16;
}

upstream pulse_license {
    server pulse-license:8002;
    keepalive 8;
}

# ── HTTP → HTTPS (certbot adds ssl blocks; keep these for renewal) ────────────

server {
    listen 80;
    listen [::]:80;
    server_name
        entivia.online
        www.entivia.online
        app.entivia.online
        docs.entivia.online
        api.entivia.online
        license.entivia.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# entivia.online — Marketing & legal only (no auth or dashboard)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 25m;

    # Auth and product UI live on app.*
    location /auth {
        return 301 https://app.entivia.online$request_uri;
    }

    location /dashboard {
        return 301 https://app.entivia.online$request_uri;
    }

    # Product docs live on docs.* (/docs/foo → docs.entivia.online/foo).
    location ~ ^/docs(?:/(.*))?$ {
        return 301 https://docs.entivia.online/$1$is_args$args;
    }

    location /_next/static/ {
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    location / {
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    return 301 https://entivia.online$request_uri;
}

# ══════════════════════════════════════════════════════════════════════════════
# app.* — Auth, onboarding, and dashboard (Next.js)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name app.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 25m;

    location ~ ^/docs(?:/(.*))?$ {
        return 301 https://docs.entivia.online/$1$is_args$args;
    }

    # Marketing routes stay on apex.
    location ~ ^/(features|pricing|trust|security|privacy|terms)(/|$) {
        return 301 https://entivia.online$request_uri;
    }

    location /_next/static/ {
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    # App home → login (dashboard layout redirects authenticated users).
    location = / {
        return 302 /auth/login;
    }

    location / {
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# docs.* — Product documentation (Next.js /docs/*)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name docs.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 10m;

    # docs.entivia.online/              → Next.js /docs
    # docs.entivia.online/getting-started → Next.js /docs/getting-started
    location = / {
        proxy_pass         http://pulse_frontend/docs;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location /_next/static/ {
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        add_header         Cache-Control "public, max-age=31536000, immutable";
        access_log         off;
    }

    location / {
        rewrite ^/(.*)$ /docs/$1 break;
        proxy_pass         http://pulse_frontend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# api.* — FastAPI backend (agent chat is /api/v1/agent on the main API process)
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name api.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 50m;

    location = /health {
        proxy_pass         http://pulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Agent SSE — same API process (:8000), not a separate public upstream.
    location ~ ^/api/v1/agent {
        proxy_pass              http://pulse_api;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        chunked_transfer_encoding on;
    }

    location /api/ {
        proxy_pass         http://pulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        proxy_pass         http://pulse_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # Internal OpenAPI — public ReDoc stays at /api/public/redoc for API reference links.
    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    location = / {
        return 200 'Pulse API\n';
        add_header Content-Type text/plain;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# license.* — Pulse license server
# ══════════════════════════════════════════════════════════════════════════════

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name license.entivia.online;

    ssl_certificate     /etc/letsencrypt/live/entivia.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/entivia.online/privkey.pem;


    client_max_body_size 1m;

    location = /health {
        proxy_pass         http://pulse_license;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /validate {
        proxy_pass         http://pulse_license;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /api/v1/keys/ {
        proxy_pass         http://pulse_license;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location ~ ^/(docs|redoc|openapi\.json)$ {
        return 404;
    }

    location = / {
        return 200 'Pulse License Server\n';
        add_header Content-Type text/plain;
    }
}
