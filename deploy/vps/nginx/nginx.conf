# Optional main nginx.conf snippets for Pulse VPS.
# Most hosts keep the distro /etc/nginx/nginx.conf and only install pulse.conf
# under sites-available. Use this file only if you manage the full nginx.conf.

user www-data;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;

    # Trust the VPS itself (Docker publishes ports on 127.0.0.1)
    real_ip_header X-Forwarded-For;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    include /etc/nginx/sites-enabled/*;
}
