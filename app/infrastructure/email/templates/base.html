<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ subject }}</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f6f8fb;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #1a1a2e;
    }
    .wrapper {
      max-width: 560px;
      margin: 48px auto;
      background: #ffffff;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .header {
      background: #1a1a2e;
      padding: 32px 40px;
    }
    .header .logo {
      font-size: 22px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: -0.5px;
    }
    .header .logo span {
      color: #6366f1;
    }
    .body {
      padding: 40px;
    }
    .body h1 {
      font-size: 22px;
      font-weight: 600;
      margin: 0 0 12px;
      color: #1a1a2e;
    }
    .body p {
      font-size: 15px;
      line-height: 1.6;
      color: #4b5563;
      margin: 0 0 20px;
    }
    .btn {
      display: inline-block;
      padding: 14px 28px;
      background: #6366f1;
      color: #ffffff !important;
      text-decoration: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      margin: 8px 0 24px;
    }
    .divider {
      border: none;
      border-top: 1px solid #f0f0f5;
      margin: 28px 0;
    }
    .fallback {
      font-size: 13px;
      color: #9ca3af;
      word-break: break-all;
    }
    .footer {
      padding: 24px 40px;
      background: #f6f8fb;
      font-size: 13px;
      color: #9ca3af;
      text-align: center;
    }
    .footer a {
      color: #9ca3af;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="logo">Pulse<span>.</span></div>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      &copy; {{ year }} Pulse · Real-Time Intelligence for Any Business<br/>
      If you didn't request this email, you can safely ignore it.
    </div>
  </div>
</body>
</html>
