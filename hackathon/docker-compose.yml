# Hackathon submission stack — run from repo root:
#   make hackathon-up          # postgres + qdrant + task-a + task-b (+ combined API on :8010)
#   make hackathon-load        # one-shot data loader
#   open http://localhost:8011/docs   # Task A only
#   open http://localhost:8012/docs   # Task B only
# Swagger/OpenAPI uses HACKATHON_PUBLIC_API_URL below so judges see the
# production endpoint to query instead of the internal Docker service URL.
#
# Networks:
#   hackathon (internal)              — postgres / qdrant / app services
#   reverse-proxy_nginx-network (ext) — only the API services join, with aliases
#                                       (pulse-hackathon-a, pulse-hackathon-b,
#                                        pulse-hackathon) so the dockerised
#                                       nginx-proxy can reach them via Docker DNS.
#                                       Create once with:
#                                         docker network create reverse-proxy_nginx-network

x-hackathon-env: &hackathon-env
  HACKATHON_DATABASE_URL: postgresql+asyncpg://hackathon:${HACKATHON_DATABASE_PASSWORD}@postgres:5432/hackathon
  QDRANT_URL: http://qdrant:6333
  HACKATHON_EMBEDDING_BACKEND: voyage
  HACKATHON_VOYAGE_MODEL: voyage-4-large
  HACKATHON_VECTOR_SIZE: "1024"
  HACKATHON_USE_PSEUDO_EMBEDDINGS: "0"
  HACKATHON_MAX_YELP_ITEMS: "12000"
  HACKATHON_ALLOW_SYNTHETIC: "1"
  HACKATHON_YELP_DIR: /data/yelp
  FASTEMBED_CACHE_PATH: /models

x-hackathon-service: &hackathon-service
  image: entivia-hackathon:latest
  env_file:
    - .env
  environment:
    <<: *hackathon-env
  depends_on:
    postgres:
      condition: service_healthy
    qdrant:
      condition: service_started
  volumes:
    - hackathon_models:/models
    - ./eval/data:/app/hackathon/eval/data
  networks:
    - hackathon

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: hackathon
      POSTGRES_PASSWORD: ${HACKATHON_DATABASE_PASSWORD}
      POSTGRES_DB: hackathon
    ports:
      - "5436:5432"
    volumes:
      - hackathon_pg:/var/lib/postgresql/data
    networks:
      - hackathon
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hackathon"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6334:6333"
    volumes:
      - hackathon_qdrant:/qdrant/storage
    networks:
      - hackathon

  # Task A — Review Simulation Agent
  task-a-api:
    <<: *hackathon-service
    environment:
      <<: *hackathon-env
      HACKATHON_PUBLIC_API_URL: https://hackathon-a.entivia.online
    build:
      context: ..
      dockerfile: hackathon/Dockerfile
    ports:
      - "8011:8000"
    networks:
      hackathon: {}
      reverse-proxy_nginx-network:
        aliases:
          - pulse-hackathon-a
    command: ["uvicorn", "hackathon.app.task_a:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "2"]

  # Task B — Recommendation Agent
  # NOTE: single worker on purpose. /recommend stores multi-turn conversation
  # state in an in-process dict; with >1 worker the follow_up turn can land on
  # a different process and lose the shown-item exclusions.
  task-b-api:
    <<: *hackathon-service
    environment:
      <<: *hackathon-env
      HACKATHON_PUBLIC_API_URL: https://hackathon-b.entivia.online
    ports:
      - "8012:8000"
    networks:
      hackathon: {}
      reverse-proxy_nginx-network:
        aliases:
          - pulse-hackathon-b
    command: ["uvicorn", "hackathon.app.task_b:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

  # Combined gateway (both tasks on one port — optional for local demos)
  # Same single-worker rationale as task-b-api: serves /recommend too.
  hackathon-api:
    <<: *hackathon-service
    environment:
      <<: *hackathon-env
      HACKATHON_PUBLIC_API_URL: https://hackathon.entivia.online
    ports:
      - "8010:8000"
    networks:
      hackathon: {}
      reverse-proxy_nginx-network:
        aliases:
          - pulse-hackathon
    command: ["uvicorn", "hackathon.app.main:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]

  loader:
    <<: *hackathon-service
    profiles: ["tools"]
    command: ["python", "-m", "hackathon.data.load"]

volumes:
  hackathon_pg:
  hackathon_qdrant:
  hackathon_models:

networks:
  hackathon:
    driver: bridge
  reverse-proxy_nginx-network:
    external: true
