# ─────────────────────────────────────────────────────────────────────────────
# Pulse — Self-Hosted
#
# Getting started:
#   1. cp .env.example .env
#   2. Fill in the required values in .env
#   3. docker compose up -d
#   4. Open http://localhost:8000
#
# Upgrading:
#   docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing — set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: pulse
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pulse:
    image: pulseai/pulse:${PULSE_VERSION:-latest}
    ports:
      - "${PORT:-8000}:8000"
    environment:
      # ── Database ─────────────────────────────────────────────────────────────
      DATABASE_URL: postgresql+asyncpg://pulse:${POSTGRES_PASSWORD}@db:5432/pulse

      # ── Security ─────────────────────────────────────────────────────────────
      JWT_SECRET: ${JWT_SECRET:?missing — generate with: openssl rand -hex 32}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?missing — see .env.example for generation command}

      # ── App ──────────────────────────────────────────────────────────────────
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: production
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

      # ── LLM keys (your own — required for AI features) ────────────────────
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      GROQ_API_KEY: ${GROQ_API_KEY:-}

      # ── Email (optional — needed for verify/reset flows) ─────────────────
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      DEFAULT_FROM_EMAIL: ${DEFAULT_FROM_EMAIL:-noreply@example.com}

      # ── OAuth (optional) ─────────────────────────────────────────────────
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}

      # ── Vector search (optional) ─────────────────────────────────────────
      VOYAGEAI_API_KEY: ${VOYAGEAI_API_KEY:-}
      QDRANT_URL: ${QDRANT_URL:-}
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # ── License (optional — unlocks Pro features) ─────────────────────────
      PULSE_LICENSE_KEY: ${PULSE_LICENSE_KEY:-}

      # ── Tuning ───────────────────────────────────────────────────────────
      API_WORKERS: ${API_WORKERS:-1}
      AGENT_WORKERS: ${AGENT_WORKERS:-1}
      REDIS_MAX_MEMORY: ${REDIS_MAX_MEMORY:-256mb}

    volumes:
      - pulse_data:/data          # Redis persistence + any file uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  db_data:
  pulse_data:
