# ─────────────────────────────────────────────────────────────────────────────
# Pulse — Self-Hosted
#
# Getting started:
#   1. cp .env.example .env
#   2. Fill in the required values in .env
#   3. docker compose up -d
#   4. Open http://localhost  (or http://your-server-ip)
#
# Upgrading:
#   docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing — set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: pulse
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pulse:
    image: pulseai/pulse:${PULSE_VERSION:-latest}
    env_file: .env   # all user-configurable variables come from .env
    ports:
      # Single public port — nginx routes frontend and API traffic internally.
      # Change 80:80 to e.g. 3000:80 to run on a different host port.
      - "${PORT:-80}:80"
    environment:
      # These three override or supplement .env because they depend on the
      # internal Docker network or must be fixed regardless of user config.
      DATABASE_URL: postgresql+asyncpg://pulse:${POSTGRES_PASSWORD}@db:5432/pulse
      # Entrypoint chowns this path to uid 1001 on startup (see docker-entrypoint.sh).
      LOCAL_STORAGE_PATH: /app/uploads

    volumes:
      - pulse_data:/data           # Redis persistence
      - uploads_data:/app/uploads  # file uploads — avatars, logos, CSVs
    dns:
      - 8.8.8.8
      - 8.8.4.4
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  db_data:
  pulse_data:     # Redis + internal data persistence
  uploads_data:   # uploaded files — avatars, logos, CSVs (local storage backend)
