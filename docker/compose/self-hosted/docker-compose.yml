# ─────────────────────────────────────────────────────────────────────────────
# Pulse — Self-Hosted
#
# Pull and run (like n8n): one application image plus Postgres and Qdrant.
#
#   db      Postgres
#   qdrant  Vector search
#   pulse   All-in-one — UI, API, worker, agent, scheduler, Redis, nginx (port 80)
#
#   1. cp .env.example .env
#   2. Fill in required values in .env
#   3. docker compose up -d
#   4. Open http://localhost
#
# Upgrading: docker compose pull && docker compose up -d
# ─────────────────────────────────────────────────────────────────────────────

services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: pulse
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?missing — set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: pulse
    volumes:
      - db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse -d pulse"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  pulse:
    image: pulseai/pulse:${PULSE_VERSION:-latest}
    env_file:
      - path: .env
        required: false
    ports:
      - "${PORT:-80}:80"
    environment:
      DATABASE_URL: postgresql+asyncpg://pulse:${POSTGRES_PASSWORD}@db:5432/pulse
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://127.0.0.1:6379/0
      LOCAL_STORAGE_PATH: /app/uploads
    volumes:
      - pulse_data:/data
      - uploads_data:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

volumes:
  db_data:
  qdrant_data:
  pulse_data:
  uploads_data:
