# ─────────────────────────────────────────────────────────────────────────────
# Pulse — Internal Cloud Compose
#
# For Pulse's own infrastructure. Each concern runs as a separate service so
# they can be scaled and deployed independently.
#
# Services
#   postgres   primary database  (swap for RDS/Supabase in production)
#   redis      job queue + token store + cache
#   api        REST API — stateless, scale horizontally
#   worker     pipeline execution — pulls jobs from Redis queue
#   agent      conversational AI + SSE — isolated, LLM-heavy
#   scheduler  cron trigger — always exactly ONE replica
#   license    license validation for self-hosted customers (internal only)
#
# Usage
#   docker compose up                          start everything
#   docker compose up --scale worker=4        run 4 pipeline workers
#   docker compose up api worker              start only api + worker
#
# Nginx upstream DNS (reverse-proxy_nginx-network aliases):
#   api      → pulse-api
#   license  → pulse-license
#   dashboard frontend (dashboard repo compose) → pulse-frontend
# ─────────────────────────────────────────────────────────────────────────────

x-app: &app
  # image: pulseai/pulse-cloud:${IMAGE_TAG:-latest}
  # In development, build from source instead:
  build:
    context: ../../..
    dockerfile: docker/images/pulse-cloud/Dockerfile
  env_file: .env
  environment:
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
    REDIS_URL: redis://redis:6379/0
    DEPLOYMENT_MODE: cloud
    # Local file storage path — shared named volume so api + worker see the same files.
    # Ignored when STORAGE_BACKEND=s3 or minio.
    # The pulse-cloud entrypoint chowns this path to uid 1001 on startup (see docker-entrypoint.sh).
    LOCAL_STORAGE_PATH: /app/uploads
  volumes:
    - ../../../app:/app/app
    # Persists uploaded files (avatars, logos, CSVs) across container restarts.
    # Only used when STORAGE_BACKEND=local (the default when S3/MinIO are not configured).
    # Switch to STORAGE_BACKEND=s3 or minio for production multi-replica deployments.
    - uploads_data:/app/uploads
    - ../../../logs:/app/logs
  networks:
    - pulse
    - reverse-proxy_nginx-network 
  dns:
    - 8.8.8.8
    - 8.8.4.4
  extra_hosts:
    - "host.docker.internal:host-gateway"
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
    qdrant:
      condition: service_healthy

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pulse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-pulse}
    ports:
      - "${POSTGRES_PORT:-5442}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - reverse-proxy_nginx-network 
      - pulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pulse} -d ${POSTGRES_DB:-pulse}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_data:/data
    networks:
      - pulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - pulse
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/127.0.0.1/6333'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    <<: *app
    networks:
      pulse:
      reverse-proxy_nginx-network:
        aliases:
          - pulse-api
    command: api
    environment:
      PULSE_SERVICE: api
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEPLOYMENT_MODE: cloud
      # License: cloud orgs do not activate licenses. Set LICENSE_SERVER_URL in .env only
      # if you run the `license` service and sell self-hosted keys via Paystack billing.
      API_WORKERS: ${API_WORKERS:-2}
      # Internal URL so api can proxy /agent/* requests to the agent service
      AGENT_SERVICE_URL: http://agent:8001
    ports:
      - "${API_PORT:-8040}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s

  worker:
    <<: *app
    command: worker
    environment:
      PULSE_SERVICE: worker
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEPLOYMENT_MODE: cloud
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_started    # wait for migrations
    # docker compose up --scale worker=4
    healthcheck:
      test: ["CMD", "python", "scripts/docker/redis_healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  agent:
    <<: *app
    command: agent
    environment:
      PULSE_SERVICE: agent
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEPLOYMENT_MODE: cloud
      AGENT_PORT: "8001"
      AGENT_WORKERS: ${AGENT_WORKERS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 20s
      timeout: 5s
      retries: 3
      start_period: 30s
    # Not port-exposed — api proxies to http://agent:8001 over the internal network

  scheduler:
    <<: *app
    command: scheduler
    environment:
      PULSE_SERVICE: scheduler
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL: redis://redis:6379/0
      QDRANT_URL: http://qdrant:6333
      DEPLOYMENT_MODE: cloud
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      api:
        condition: service_started
    # Scheduler is a background job process — no HTTP port, no HTTP health check
    healthcheck:
      test: ["CMD", "python", "scripts/docker/redis_healthcheck.py"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      replicas: 1               # always exactly one scheduler

  license:
    # Internal license validation server — not exposed publicly.
    # Self-hosted instances reach it via public URL (e.g. https://license.pulseai.io).
    build:
      context: ../../..
      dockerfile: docker/images/pulse-license/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-pulse}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-pulse}
      REDIS_URL: redis://redis:6379/0
      PORT: "8002"
      LICENSE_JWT_ISSUER: ${LICENSE_JWT_ISSUER:-https://license.pulseai.io}
      LICENSE_SIGNING_PRIVATE_KEY: ${LICENSE_SIGNING_PRIVATE_KEY:-}
      LICENSE_SERVER_API_KEY: ${LICENSE_SERVER_API_KEY:-}
      PULSE_LICENSE_PUBLIC_KEY: ${PULSE_LICENSE_PUBLIC_KEY:-}
    ports:
      - "${LICENSE_PORT:-8072}:8002"
    networks:
      pulse:
      reverse-proxy_nginx-network:
        aliases:
          - pulse-license
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 5s
      retries: 3

# ── Volumes & network ─────────────────────────────────────────────────────────

volumes:
  postgres_data:
  redis_data:
  uploads_data:    # local asset storage — avatars, logos, CSVs (swap for S3/MinIO in production)
  qdrant_data:

networks:
  pulse:
    driver: bridge
  reverse-proxy_nginx-network:
    external: true
