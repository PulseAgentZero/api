# ─────────────────────────────────────────────────────────────────────────────
# Pulse self-hosted — nginx reverse proxy
#
# Port 80 is the single public entry-point.
# /api/*  and /health  → FastAPI  (127.0.0.1:8000)
# everything else      → Next.js  (127.0.0.1:3000)
# ─────────────────────────────────────────────────────────────────────────────

# Required for SSE (server-sent events) upgrade header mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ""      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50m;

    # ── FastAPI health check ───────────────────────────────────────────────────
    location = /health {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    # ── Agent streaming endpoints — disable buffering for SSE ─────────────────
    # Matches /api/v1/agent/* so SSE chunks reach the browser immediately.
    location ~ ^/api/v1/agent {
        proxy_pass              http://127.0.0.1:8001;
        proxy_http_version      1.1;
        proxy_set_header        Host $host;
        proxy_set_header        X-Real-IP $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        Connection "";
        proxy_buffering         off;
        proxy_cache             off;
        proxy_read_timeout      600s;
        chunked_transfer_encoding on;
    }

    # ── All other API routes ───────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 120s;
    }

    # ── Next.js static assets — served directly, long-lived cache ─────────────
    location /_next/static/ {
        alias       /frontend/.next/static/;
        add_header  Cache-Control "public, max-age=31536000, immutable";
        access_log  off;
    }

    # ── Next.js public directory ───────────────────────────────────────────────
    location /public/ {
        alias      /frontend/public/;
        access_log off;
    }

    # ── Everything else → Next.js ──────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_read_timeout 60s;
    }
}
